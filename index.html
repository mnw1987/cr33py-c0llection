<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Creepy Collection</title>
  <style>
    :root {
      --text: #fff7fe;
      --ink: #32003f;
      --pink1: #ff9ad6;
      --pink2: #ff5db8;
      --pink3: #ff84cb;
      --border: 2px solid rgba(255,255,255,.55);
      --shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #8d35d8 0%, #4b0b73 25%, #240034 55%, #130018 100%);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    button, input {
      font: inherit;
    }

    #app {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    .background {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,109,184,.18), transparent 18%),
        radial-gradient(circle at 85% 22%, rgba(145,84,255,.18), transparent 20%),
        radial-gradient(circle at 25% 85%, rgba(120,220,255,.12), transparent 18%),
        radial-gradient(circle at 72% 72%, rgba(255,190,230,.12), transparent 18%),
        radial-gradient(circle at 50% 35%, rgba(255,208,128,.08), transparent 16%);
    }

    .floating {
      position: absolute;
      opacity: .2;
      filter: drop-shadow(0 0 10px rgba(255,255,255,.15));
      animation: floaty 6s ease-in-out infinite;
      user-select: none;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    .stage {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 480px;
      min-height: 92vh;
      background: linear-gradient(180deg, rgba(84,8,116,.96) 0%, rgba(54,4,78,.96) 100%);
      border: 4px solid rgba(255,120,204,.9);
      border-radius: 36px;
      box-shadow: 0 0 40px rgba(255,70,178,.26), var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(135deg, #260035 0%, #3a0653 45%, #63108b 100%);
      border-bottom: 2px solid rgba(255,160,220,.9);
      position: relative;
      overflow: hidden;
    }

    .header h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: .02em;
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
    }

    .header .sub {
      margin-top: 6px;
      font-size: 10px;
      color: #ffdff3;
      letter-spacing: .12em;
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .content::-webkit-scrollbar {
      width: 10px;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(255,140,208,.4);
      border-radius: 999px;
    }

    .panel, .product {
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255,137,208,.95);
      color: white;
    }

    .panel {
      background: linear-gradient(180deg, rgba(111,23,152,.96) 0%, rgba(79,10,107,.98) 100%);
      border-radius: 30px;
      margin-bottom: 14px;
    }

    .product {
      background: linear-gradient(180deg, rgba(112,22,151,.96) 0%, rgba(83,10,113,.98) 100%);
      margin-bottom: 14px;
    }

    .panel:before, .panel:after, .product:before, .product:after {
      content: "";
      position: absolute;
      width: 62px;
      height: 62px;
      border-top: 2px solid rgba(255,226,246,.7);
      border-left: 2px solid rgba(255,226,246,.7);
      opacity: .4;
      pointer-events: none;
    }

    .panel:before, .product:before {
      left: 0;
      top: 0;
    }

    .panel:after, .product:after {
      right: 0;
      bottom: 0;
      transform: rotate(180deg);
    }

    .panel-inner {
      padding: 22px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: var(--border);
      min-height: 56px;
      padding: 12px 14px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      color: var(--ink);
      background: linear-gradient(180deg, var(--pink1) 0%, var(--pink2) 100%);
      box-shadow: 0 8px 18px rgba(255,93,184,.22);
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .btn:disabled {
      cursor: not-allowed;
      filter: none;
    }

    .btn-small {
      min-height: 46px;
      border-radius: 20px 12px 20px 12px;
      font-size: 15px;
      padding: 10px 12px;
    }

    .btn-home-a, .btn-home-b {
      width: 100%;
      min-height: 132px;
      border-radius: 0;
      font-size: 34px;
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .btn-home-a {
      clip-path: polygon(12% 0%,88% 0%,100% 18%,100% 82%,88% 100%,12% 100%,0 82%,0 18%);
    }

    .btn-home-b {
      clip-path: polygon(6% 0%,100% 0%,94% 100%,0 100%);
    }

    .btn-home-a:before, .btn-home-b:before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.25), transparent 12%),
        radial-gradient(circle at 88% 85%, rgba(255,255,255,.18), transparent 10%);
      pointer-events: none;
    }

    .icon-flair {
      position: absolute;
      font-size: 30px;
      opacity: .3;
    }

    .login-icon {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--pink1), var(--pink2));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 38px;
      color: var(--ink);
      box-shadow: 0 10px 22px rgba(255,93,184,.28);
    }

    .title-center {
      text-align: center;
    }

    .title-center h2 {
      margin: 6px 0 8px;
      font-size: 34px;
      font-weight: 900;
    }

    .help-text {
      color: #ffd4ef;
      font-size: 14px;
      line-height: 1.35;
    }

    .field {
      width: 100%;
      min-height: 56px;
      border: 2px solid rgba(255,210,236,.95);
      border-radius: 18px;
      background: white;
      color: #3a0c53;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      padding: 10px 12px;
      margin: 10px 0 6px;
    }

    .error {
      color: #ffd2ec;
      font-weight: 900;
      text-align: center;
      margin-top: 8px;
    }

    .row-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 4;
      background: linear-gradient(180deg, rgba(68,6,96,.96), rgba(68,6,96,.88));
      padding-bottom: 8px;
      backdrop-filter: blur(4px);
    }

    .row-head h3 {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
    }

    .shape-0 { border-radius: 30px; }
    .shape-1 { border-radius: 34px 20px 34px 20px; }
    .shape-2 { border-radius: 20px 34px 20px 34px; }
    .shape-3 { border-radius: 28px; transform: rotate(-.5deg); }

    .product-inner {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .product-left {
      min-width: 0;
      flex: 1;
    }

    .product-title {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.15;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 900;
      color: #4a0c60;
      background: #ffd7ef;
      border-radius: 16px 10px 16px 10px;
    }

    .tag.alt1 { border-radius: 999px; }
    .tag.alt2 { border-radius: 10px 16px 10px 16px; }
    .tag.alt3 { border-radius: 18px; }

    .price {
      margin-top: 12px;
      color: #ffd7ef;
      font-size: 18px;
      font-weight: 900;
    }

    .muted {
      opacity: .82;
    }

    .basket-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #6d2395;
      border: 1px solid rgba(255,220,240,.22);
      padding: 14px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .basket-item-title {
      font-weight: 900;
    }

    .basket-total {
      background: linear-gradient(135deg,#ff7dc9 0%,#ff5bb8 55%,#e13897 100%);
      color: var(--ink);
    }

    .center {
      text-align: center;
    }

    .coffin {
      min-width: 116px;
      height: 58px;
      border-radius: 0;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-size: 16px;
    }

    .coffin.open {
      background: linear-gradient(180deg,#ff9ad6 0%,#ff5db8 100%);
      color: var(--ink);
      clip-path: polygon(18% 0%,82% 0%,100% 18%,100% 82%,82% 100%,18% 100%,0 82%,0 18%);
    }

    .coffin.closed {
      background: linear-gradient(180deg,#5c465d 0%,#2f2030 100%);
      color: rgba(255,245,252,.92);
      clip-path: polygon(18% 0%,82% 0%,100% 18%,100% 100%,0 100%,0 18%);
    }

    .coffin:before, .coffin:after {
      content: "";
      position: absolute;
      top: 0;
      height: 100%;
      width: 2px;
      background: rgba(0,0,0,.28);
    }

    .coffin:before { left: 0; }
    .coffin:after { right: 0; }

    .coffin .midline {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      height: 100%;
      width: 2px;
      background: rgba(255,255,255,.22);
    }

    .coffin-label {
      position: relative;
      z-index: 2;
    }

    .ribbon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ffd7ef;
      color: #4a0c60;
      padding: 8px 14px;
      font-weight: 900;
      border-radius: 20px 10px 20px 10px;
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 8px 16px rgba(0,0,0,.18);
      margin-bottom: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 90;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .claw-cursor {
      position: fixed;
      z-index: 80;
      pointer-events: none;
      width: 58px;
      height: 58px;
      filter: drop-shadow(0 0 14px rgba(183,92,255,.55));
    }

    .tap-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 70;
    }

    .burst {
      position: absolute;
      width: 160px;
      height: 130px;
      transform: translate(-50%,-50%);
      animation: burst .72s ease-out forwards;
    }

    @keyframes burst {
      0% { opacity: 1; transform: translate(-50%,-50%) scale(.3); }
      100% { opacity: 0; transform: translate(-50%,-68%) scale(2.3); }
    }

    .scratch {
      position: absolute;
      inset: 0;
    }

    .slash {
      position: absolute;
      width: 5px;
      height: 68px;
      border-radius: 999px;
      background: linear-gradient(180deg,#ffd8ff 0%,#c57cff 45%,#7b2cff 100%);
      box-shadow: 0 0 12px rgba(196,120,255,.98);
    }

    .slash.small {
      width: 3px;
      height: 44px;
      box-shadow: 0 0 8px rgba(196,120,255,.95);
    }

    .spark {
      position: absolute;
      color: #f6d8ff;
      text-shadow: 0 0 12px rgba(208,126,255,1);
      font-weight: 900;
    }

    .spark.cyan {
      color: #d8f7ff;
    }

    @media (max-width: 420px) {
      .header h1 { font-size: 24px; }
      .btn-home-a, .btn-home-b { font-size: 28px; min-height: 122px; }
      .product-inner { padding: 14px; }
      .product-title { font-size: 18px; }
      .coffin { min-width: 106px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  const PASSWORD = "2017";

  const BUNDLES = [
    { id:"snack-bundle", name:"Snack Bundle", price:7.50, itemIds:["gummy-bites","howl-puffs","fish-eye-scream","pot-of-treats","pot-of-sweets","yogurt-drink"], description:"Gummy Bites, Howl Puffs, Fish Eye Scream, Pot of Treats, Pot of Sweets, Yogurt Drink" },
    { id:"pharaoh-bundle", name:"Pharaoh Bundle", price:654.99, itemIds:["bronze-phone","gold-laptop","gold-waterbottle"], description:"Bronze Phone, Gold Laptop, Gold Waterbottle" },
    { id:"gardening-bundle", name:"Gardening Bundle", price:40, itemIds:["plants-in-a-pot","trowel","garden-hand-fork","watering-can","gardening-gloves"], description:"Plants in a Pot, Trowel, Garden Hand Fork, Watering Can, Gardening Gloves" },
    { id:"accessories-bundle", name:"Accessories Bundle", price:720, itemIds:["deadfish-ear-rings","gold-scorpian-ear-rings","orange-seahorse-necklace","green-bead-necklace-and-bracelet","silver-spike-necklace-and-bracelet","green-ponytail-holder"], description:"Deadfish Ear rings, Gold Scorpian Ear rings, Orange Seahorse Necklace, Green bead Necklace and Bracelet, Silver spike Necklace and Bracelet, Green Ponytail Holder" },
    { id:"belt-bundle", name:"Belt Bundle", price:30, itemIds:["pink-belt","gold-belt","red-belt"], description:"Pink Belt, Gold Belt, Red Belt" },
    { id:"school-bundle", name:"School Bundle", price:20.99, itemIds:["notebook","exercise-book","pen","pencil"], choiceItems:["green-backpack","jellyfish-backpack"], description:"Choose Green Backpack or Jellyfish Backpack, plus Notebook, Exercise book, Pen, Pencil" },
    { id:"day-out-bundle", name:"Day Out Bundle", price:49.99, itemIds:["nature-bag","bubble-boos","purple-phone","unearth-day-poster"], description:"Nature Bag, Bubble boos, Purple Phone, Unearth day poster" }
  ];

  const ITEMS = [
    { id:"gummy-bites", name:"Gummy Bites", price:1.50, pet:false },
    { id:"howl-puffs", name:"Howl Puffs", price:1.50, pet:false },
    { id:"fish-eye-scream", name:"Fish Eye Scream", price:2, pet:false },
    { id:"pot-of-treats", name:"Pot of Treats", price:2, pet:false },
    { id:"pot-of-sweets", name:"Pot of Sweets", price:2, pet:false },
    { id:"yogurt-drink", name:"Yogurt Drink", price:2, pet:false },
    { id:"notebook", name:"Notebook", price:4, pet:false },
    { id:"exercise-book", name:"Exercise book", price:4, pet:false },
    { id:"pen", name:"Pen", price:5, pet:false },
    { id:"pencil", name:"Pencil", price:5, pet:false },
    { id:"green-backpack", name:"Green Backpack", price:5, pet:false },
    { id:"jellyfish-backpack", name:"Jellyfish Backpack", price:5, pet:false },
    { id:"trowel", name:"Trowel", price:8, pet:false },
    { id:"garden-hand-fork", name:"Garden Hand Fork", price:8, pet:false },
    { id:"watering-can", name:"Watering Can", price:9, pet:false },
    { id:"gardening-gloves", name:"Gardening Gloves", price:9, pet:false },
    { id:"plants-in-a-pot", name:"Plants in a Pot", price:10, pet:false },
    { id:"pink-belt", name:"Pink Belt", price:11, pet:false },
    { id:"gold-belt", name:"Gold Belt", price:11, pet:false },
    { id:"red-belt", name:"Red Belt", price:11, pet:false },
    { id:"nature-bag", name:"Nature Bag", price:12, pet:false },
    { id:"purple-phone", name:"Purple Phone", price:14, pet:false },
    { id:"unearth-day-poster", name:"Unearth day poster", price:14, pet:false },
    { id:"bubble-boos", name:"Bubble boos", price:15, pet:false },
    { id:"green-scarab", name:"Green Scarab", price:50, pet:true },
    { id:"pink-piranha", name:"Pink Piranha", price:70, pet:true },
    { id:"gold-dog", name:"Gold Dog", price:99.99, pet:true },
    { id:"deadfish-ear-rings", name:"Deadfish Ear rings", price:120, pet:false },
    { id:"green-bead-necklace-and-bracelet", name:"Green bead Necklace and Bracelet", price:120, pet:false },
    { id:"orange-seahorse-necklace", name:"Orange Seahorse Necklace", price:130, pet:false },
    { id:"green-ponytail-holder", name:"Green Ponytail Holder", price:132, pet:false },
    { id:"silver-spike-necklace-and-bracelet", name:"Silver spike Necklace and Bracelet", price:140, pet:false },
    { id:"gold-waterbottle", name:"Gold Waterbottle", price:140, pet:false },
    { id:"gold-scorpian-ear-rings", name:"Gold Scorpian Ear rings", price:150, pet:false },
    { id:"pink-genie-cat", name:"Pink Genie Cat", price:200, pet:true },
    { id:"bronze-phone", name:"Bronze Phone", price:220, pet:false },
    { id:"gold-laptop", name:"Gold Laptop", price:360, pet:false }
  ].sort((a,b)=>a.price-b.price || a.name.localeCompare(b.name));

  const state = {
    screen: "login",
    password: "",
    error: "",
    basket: [],
    modalBundle: null,
    cursor: { x:0, y:0, visible:false },
    showCursor: window.matchMedia && window.matchMedia("(pointer:fine)").matches
  };

  const app = document.getElementById("app");

  function formatPrice(value){
    return new Intl.NumberFormat("en-GB", {
      style:"currency",
      currency:"GBP",
      minimumFractionDigits: value % 1 === 0 ? 0 : 2,
      maximumFractionDigits: 2
    }).format(value);
  }

  function el(tag, attrs, children){
    const node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach((key)=>{
      const value = attrs[key];
      if (value === null || value === undefined) return;
      if (key === "class") node.className = value;
      else if (key === "html") node.innerHTML = value;
      else if (key === "text") node.textContent = value;
      else if (key === "value") node.value = value;
      else if (key.slice(0,2) === "on" && typeof value === "function") node.addEventListener(key.slice(2).toLowerCase(), value);
      else node.setAttribute(key, value);
    });
    const list = Array.isArray(children) ? children : [children];
    list.filter(Boolean).forEach((child)=>{
      if (child instanceof Node) node.appendChild(child);
      else node.appendChild(document.createTextNode(String(child)));
    });
    return node;
  }

  function scratchMarkup(small){
    return `
      <div class="scratch">
        <div class="slash ${small ? 'small':''}" style="left:16%;top:10%;transform:rotate(-26deg)"></div>
        <div class="slash ${small ? 'small':''}" style="left:42%;top:2%;transform:rotate(-14deg)"></div>
        <div class="slash ${small ? 'small':''}" style="left:68%;top:12%;transform:rotate(4deg)"></div>
        <div class="spark" style="left:6%;top:18%;font-size:10px">✦</div>
        <div class="spark" style="right:8%;top:8%;font-size:12px">✦</div>
        <div class="spark" style="left:30%;bottom:8%;font-size:10px;color:#ffd7ef">✦</div>
        <div class="spark" style="right:26%;bottom:2%;font-size:9px;color:#e7dcff">✦</div>
      </div>`;
  }

  function selectedItemIds(){
    const ids = new Set();
    state.basket.forEach(entry => entry.itemIds.forEach(id => ids.add(id)));
    return ids;
  }

  function selectedBundleIds(){
    const ids = new Set();
    state.basket.forEach(entry => {
      if (entry.type === "bundle") ids.add(entry.id);
    });
    return ids;
  }

  function bundleStatus(bundle){
    if (selectedBundleIds().has(bundle.id)) return { disabled:true, note:"Already in basket", button:"Added" };
    const allItems = [].concat(bundle.itemIds || [], bundle.choiceItems || []);
    const conflict = allItems.some(id => selectedItemIds().has(id));
    if (conflict) return { disabled:true, note:"Unavailable. One or more matching items are already chosen.", button:"Out of stock" };
    return { disabled:false, note:bundle.description, button:"Add" };
  }

  function singleStatus(item){
    if (state.basket.some(entry => entry.type === "single" && entry.id === item.id)) return { disabled:true, note:"Already in basket", button:"Added" };
    const chosenBundle = state.basket.find(entry => entry.type === "bundle" && entry.itemIds.includes(item.id));
    if (chosenBundle) return { disabled:true, note:"Included in " + chosenBundle.label, button:"Included" };
    return { disabled:false, note:item.pet ? "Pet item" : "Tap to add", button:"Add" };
  }

  function addBurst(x,y){
    const burstLayer = document.querySelector(".tap-burst");
    const burst = el("div", { class:"burst", style:`left:${x}px;top:${y}px` }, [
      el("div", { html: scratchMarkup(false) }),
      el("div", { class:"spark", text:"✦", style:"left:2px;top:4px;font-size:28px" }),
      el("div", { class:"spark", text:"✦", style:"right:4px;top:0;font-size:34px;color:#dfd5ff" }),
      el("div", { class:"spark", text:"✦", style:"left:38px;bottom:4px;font-size:28px;color:#ffd7ef" }),
      el("div", { class:"spark", text:"✦", style:"right:26px;bottom:7px;font-size:24px;color:#f4ddff" }),
      el("div", { class:"spark cyan", text:"⚡", style:"left:46%;top:38%;font-size:22px" }),
      el("div", { class:"spark cyan", text:"⚡", style:"left:58%;top:52%;font-size:18px" })
    ]);
    burstLayer.appendChild(burst);
    setTimeout(()=>burst.remove(), 760);
  }

  function commitBundle(bundle, choiceId){
    const choiceLabel = choiceId ? ((ITEMS.find(i=>i.id===choiceId)||{}).name || "") : "";
    const itemIds = [].concat(bundle.itemIds || [], choiceId ? [choiceId] : []);
    state.basket.push({
      id: bundle.id,
      label: choiceId ? bundle.name + " - " + choiceLabel : bundle.name,
      price: bundle.price,
      type: "bundle",
      itemIds: itemIds
    });
    state.modalBundle = null;
    render();
  }

  function addBundle(bundle){
    const status = bundleStatus(bundle);
    if (status.disabled) return;
    if (bundle.choiceItems && bundle.choiceItems.length){
      state.modalBundle = bundle;
      render();
      return;
    }
    commitBundle(bundle, null);
  }

  function addSingle(item){
    const status = singleStatus(item);
    if (status.disabled) return;
    state.basket.push({
      id: item.id,
      label: item.name,
      price: item.price,
      type: "single",
      itemIds: [item.id]
    });
    render();
  }

  function removeBasketItem(index){
    state.basket = state.basket.filter((_,i)=>i!==index);
    render();
  }

  function clearSale(){
    state.basket = [];
    state.screen = "menu";
    render();
  }

  function renderBackground(){
    return el("div", { class:"background" }, [
      floating("🦇","top:10px;left:20px;font-size:44px;animation-delay:0s"),
      floating("🦇","top:70px;right:22px;font-size:54px;animation-delay:1s"),
      floating("🦇","bottom:120px;left:16px;font-size:38px;animation-delay:2s"),
      floating("🦇","bottom:60px;right:18px;font-size:44px;animation-delay:3s"),
      floating("🪲","top:60px;left:34%;font-size:28px;animation-delay:1.4s"),
      floating("🪲","bottom:70px;left:22px;font-size:28px;animation-delay:2.4s"),
      floating("🪲","top:50%;right:32px;font-size:28px;animation-delay:3.4s"),
      floating("🪲","top:58%;left:14%;font-size:23px;animation-delay:1.9s"),
      floating("⚡","top:36px;right:100px;font-size:34px;color:#b2ecff;animation-delay:.6s"),
      floating("⚡","bottom:92px;right:25%;font-size:34px;color:#b2ecff;animation-delay:1.6s"),
      floating("⚡","top:38%;left:8%;font-size:28px;color:#d5f7ff;animation-delay:2.1s"),
      floating("💀","top:28px;left:52%;font-size:24px;animation-delay:2.8s"),
      floating("✨","bottom:20px;right:24px;font-size:24px;animation-delay:3.2s"),
      el("div",{class:"floating",html:scratchMarkup(false),style:"top:44px;right:84px;width:130px;height:76px;opacity:.22;animation-delay:1.1s"}),
      el("div",{class:"floating",html:scratchMarkup(false),style:"bottom:120px;left:52px;width:122px;height:70px;opacity:.22;animation-delay:2.3s"}),
      el("div",{class:"floating",html:scratchMarkup(true),style:"top:50%;right:4px;width:95px;height:58px;opacity:.18;animation-delay:1.7s"})
    ]);
  }

  function floating(text, style){
    return el("div", { class:"floating", text:text, style:style });
  }

  function renderHeader(){
    return el("div",{class:"header"},[
      el("div",{},[
        el("h1",{text:"Creepy Collection"}),
        el("div",{class:"sub",text:"Hope you enjoy poop2, Love from Pooh"})
      ]),
      buttonSmall("🧺 Basket (" + state.basket.length + ")", ()=>{ state.screen="basket"; render(); }, "header-basket")
    ]);
  }

  function buttonSmall(label, onClick, extra){
    return el("button",{
      class:"btn btn-small " + (extra || ""),
      onclick:(e)=>{
        addBurst(e.clientX,e.clientY);
        onClick();
      }
    }, label);
  }

  function buttonHome(label, cls, leftIcon, rightIcon, onClick){
    return el("button",{
      class:"btn " + cls,
      onclick:(e)=>{
        addBurst(e.clientX,e.clientY);
        onClick();
      }
    },[
      el("div",{class:"icon-flair", text:leftIcon, style:"left:14px;top:8px"}),
      el("div",{class:"icon-flair", text:rightIcon, style:"right:18px;bottom:8px"}),
      label
    ]);
  }

  function renderLogin(){
    return el("div",{class:"panel"},[
      el("div",{class:"panel-inner"},[
        el("div",{class:"login-icon",text:"🔒"}),
        el("div",{class:"title-center"},[
          el("h2",{text:"Welcome"}),
          el("div",{class:"help-text",text:"Press sign on and enter the password."})
        ]),
        el("input",{
          class:"field",
          type:"password",
          placeholder:"Password",
          value:state.password,
          oninput:(e)=>{
            state.password = e.target.value;
            state.error = "";
          }
        }),
        state.error ? el("div",{class:"error",text:state.error}) : null,
        el("button",{
          class:"btn btn-small",
          style:"width:100%;min-height:62px;border-radius:24px 14px 24px 14px;font-size:22px;margin-top:10px",
          onclick:(e)=>{
            addBurst(e.clientX,e.clientY);
            if (state.password === PASSWORD){
              state.screen = "menu";
              state.error = "";
            } else {
              state.error = "Try again";
            }
            render();
          }
        },"Sign On")
      ])
    ]);
  }

  function renderMenu(){
    return el("div",{},[
      buttonHome("Bundles","btn-home-a","🦇","✨",()=>{ state.screen="bundles"; render(); }),
      buttonHome("Single Items","btn-home-b","🦇","💖",()=>{ state.screen="singles"; render(); })
    ]);
  }

  function renderBackHeader(title){
    return el("div",{class:"row-head"},[
      buttonSmall("← Back", ()=>{ state.screen="menu"; render(); }),
      el("h3",{text:title})
    ]);
  }

  function ribbon(title){
    return el("div",{class:"ribbon"},["🦇 ", title]);
  }

  function tagClass(i){
    return ["tag alt1","tag","tag alt2","tag alt3"][i % 4];
  }

  function shapeClass(i){
    return ["shape-0","shape-1","shape-2","shape-3"][i % 4];
  }

  function coffinButton(label, disabled, icon){
    return el("button",{
      class:"btn coffin " + (disabled ? "closed" : "open"),
      disabled:disabled ? "disabled" : null
    },[
      !disabled ? el("div",{class:"midline"}) : null,
      el("span",{class:"coffin-label"},[icon + " ", label])
    ]);
  }

  function productCard(data, idx, onAdd, disabled, buttonLabel){
    const btn = coffinButton(buttonLabel, disabled, data.icon);
    btn.addEventListener("click",(e)=>{
      e.preventDefault();
      if (disabled) return;
      addBurst(e.clientX,e.clientY);
      onAdd();
    });
    return el("div",{class:"product " + shapeClass(idx) + (disabled ? " muted" : "")},[
      el("div",{class:"product-inner"},[
        el("div",{class:"product-left"},[
          el("div",{class:"product-title",text:data.title}),
          el("div",{class:tagClass(idx),text:data.note}),
          el("div",{class:"price",text:data.price})
        ]),
        btn
      ])
    ]);
  }

  function renderBundles(){
    const wrap = el("div",{},[renderBackHeader("Bundles")]);
    BUNDLES.forEach((bundle, idx)=>{
      const status = bundleStatus(bundle);
      wrap.appendChild(productCard({
        title: bundle.name,
        note: status.note,
        price: "Deal price " + formatPrice(bundle.price),
        icon: "⚰"
      }, idx, ()=>addBundle(bundle), status.disabled, status.button));
    });
    return wrap;
  }

  function renderSingles(){
    const wrap = el("div",{},[
      renderBackHeader("Single Items"),
      ribbon("Sorted cheapest to priciest")
    ]);
    ITEMS.forEach((item, idx)=>{
      const status = singleStatus(item);
      wrap.appendChild(productCard({
        title: item.name,
        note: status.note,
        price: formatPrice(item.price),
        icon: item.pet ? "✨" : "⚰"
      }, idx, ()=>addSingle(item), status.disabled, status.button));
    });
    return wrap;
  }

  function renderBasket(){
    const wrap = el("div",{},[renderBackHeader("Basket")]);
    const panel = el("div",{class:"panel"},[
      el("div",{class:"panel-inner"},[
        state.basket.length === 0 ? el("div",{class:"center",style:"padding:22px 0;color:#ffd4ef;font-weight:900",text:"Basket is empty"}) : null
      ])
    ]);
    const inner = panel.querySelector(".panel-inner");
    state.basket.forEach((entry, index)=>{
      inner.appendChild(el("div",{class:"basket-item"},[
        el("div",{},[
          el("div",{class:"basket-item-title",text:entry.label}),
          el("div",{class:"help-text",text:formatPrice(entry.price)})
        ]),
        buttonSmall("🗑", ()=>removeBasketItem(index))
      ]));
    });
    wrap.appendChild(panel);
    wrap.appendChild(el("div",{class:"panel basket-total"},[
      el("div",{class:"panel-inner",style:"display:flex;justify-content:space-between;align-items:center;padding:16px 18px"},[
        el("div",{style:"font-size:24px;font-weight:900",text:"Total"}),
        el("div",{style:"font-size:30px;font-weight:900",text:formatPrice(state.basket.reduce((s,x)=>s+x.price,0))})
      ])
    ]));
    wrap.appendChild(el("div",{class:"top-actions"},[
      el("button",{class:"btn btn-small",style:"flex:1;border-radius:22px 12px 22px 12px;background:white",onclick:(e)=>{ addBurst(e.clientX,e.clientY); clearSale(); }},"Clear"),
      el("button",{class:"btn btn-small",style:"flex:1;border-radius:12px 22px 12px 22px",disabled:state.basket.length ? null : "disabled",onclick:(e)=>{ if (!state.basket.length) return; addBurst(e.clientX,e.clientY); state.screen='paid'; render(); }},"Pretend Pay")
    ]));
    return wrap;
  }

  function renderPaid(){
    return el("div",{class:"panel"},[
      el("div",{class:"panel-inner center"},[
        el("div",{class:"login-icon",style:"background:linear-gradient(180deg,#ff8cd0,#ff4eb0)",text:"✔"}),
        el("div",{style:"font-size:38px;font-weight:900;margin-top:4px",text:"Payment Done"}),
        el("div",{class:"help-text",style:"font-weight:700;margin-top:10px",text:"Pretend total paid: " + formatPrice(state.basket.reduce((s,x)=>s+x.price,0))}),
        el("button",{class:"btn btn-small",style:"width:100%;min-height:56px;border-radius:22px 12px 22px 12px;margin-top:16px",onclick:(e)=>{ addBurst(e.clientX,e.clientY); state.basket=[]; state.screen='menu'; render(); }},"New Sale")
      ])
    ]);
  }

  function renderModal(){
    if (!state.modalBundle) return null;
    const choices = (state.modalBundle.choiceItems || []).map(id => ITEMS.find(item => item.id === id)).filter(Boolean);
    return el("div",{class:"modal-backdrop"},[
      el("div",{style:"width:100%;max-width:390px"},[
        el("div",{class:"panel"},[
          el("div",{class:"panel-inner"},[
            el("div",{class:"center",style:"font-size:32px;font-weight:900;margin-bottom:8px",text:"Choose a Backpack"}),
            el("div",{class:"help-text center",style:"margin-bottom:16px",text:"Pick which backpack comes with the School Bundle."}),
            ...choices.map((choice, idx)=>el("button",{
              class:"btn btn-small",
              style:"width:100%;min-height:62px;margin-bottom:10px;border-radius:" + (idx % 2 === 0 ? "24px 14px 24px 14px" : "14px 24px 14px 24px"),
              onclick:(e)=>{
                addBurst(e.clientX,e.clientY);
                commitBundle(state.modalBundle, choice.id);
              }
            }, choice.name)),
            el("button",{class:"btn btn-small",style:"width:100%;min-height:52px;background:white;border-radius:18px;color:#3a0c53",onclick:(e)=>{ addBurst(e.clientX,e.clientY); state.modalBundle=null; render(); }},"Cancel")
          ])
        ])
      ])
    ]);
  }

  function renderCursor(){
    if (!state.showCursor || !state.cursor.visible) return null;
    return el("div",{class:"claw-cursor",style:`left:${state.cursor.x+12}px;top:${state.cursor.y+8}px`},[
      el("svg",{viewBox:"0 0 100 100",html:`
        <defs>
          <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffd18d"></stop>
            <stop offset="100%" stop-color="#f3a85f"></stop>
          </linearGradient>
          <linearGradient id="nailGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c86bff"></stop>
            <stop offset="100%" stop-color="#6e1ed8"></stop>
          </linearGradient>
        </defs>
        <g transform="translate(10,8) rotate(-12 40 42)">
          <path d="M38 72 C26 65,18 52,20 38 C22 25,32 18,42 20 C51 22,58 28,61 38 C64 49,61 61,54 71 Z" fill="url(#skinGrad)" stroke="#8d4a24" stroke-width="2.4" stroke-linejoin="round"></path>
          <path d="M24 40 C20 35,19 28,22 22 C24 18,28 16,31 18 C34 20,34 26,33 31 L32 43 Z" fill="url(#skinGrad)" stroke="#8d4a24" stroke-width="2.2"></path>
          <path d="M34 26 C32 18,34 10,39 6 C43 3,48 4,50 8 C52 12,50 19,47 26 L43 39 Z" fill="url(#skinGrad)" stroke="#8d4a24" stroke-width="2.2"></path>
          <path d="M47 24 C48 16,53 9,58 7 C62 5,66 7,67 11 C68 15,65 21,60 27 L53 39 Z" fill="url(#skinGrad)" stroke="#8d4a24" stroke-width="2.2"></path>
          <path d="M58 39 C64 35,71 33,76 35 C80 37,81 41,79 45 C77 49,71 51,65 52 L55 49 Z" fill="url(#skinGrad)" stroke="#8d4a24" stroke-width="2.2"></path>
          <path d="M20 17 L28 20 L30 10 Z" fill="url(#nailGrad)" stroke="#4d146e" stroke-width="2" stroke-linejoin="round"></path>
          <path d="M39 6 L46 9 L44 0 Z" fill="url(#nailGrad)" stroke="#4d146e" stroke-width="2" stroke-linejoin="round"></path>
          <path d="M58 8 L64 13 L67 4 Z" fill="url(#nailGrad)" stroke="#4d146e" stroke-width="2" stroke-linejoin="round"></path>
          <path d="M77 34 L76 42 L84 39 Z" fill="url(#nailGrad)" stroke="#4d146e" stroke-width="2" stroke-linejoin="round"></path>
        </g>`}),
      el("div",{class:"spark",text:"✦",style:"left:-2px;top:2px;font-size:11px"}),
      el("div",{class:"spark",text:"✦",style:"right:2px;top:6px;font-size:12px;color:#e0d9ff"}),
      el("div",{class:"spark",text:"✦",style:"left:16px;bottom:2px;font-size:10px;color:#ffd7ef"})
    ]);
  }

  function renderScreen(){
    if (state.screen === "login") return renderLogin();
    if (state.screen === "menu") return renderMenu();
    if (state.screen === "bundles") return renderBundles();
    if (state.screen === "singles") return renderSingles();
    if (state.screen === "basket") return renderBasket();
    if (state.screen === "paid") return renderPaid();
    return renderLogin();
  }

  function render(){
    app.innerHTML = "";
    const shell = el("div",{class:"shell"},[
      renderHeader(),
      el("div",{class:"content"},[renderScreen()])
    ]);
    const stage = el("div",{class:"stage"},[shell]);
    const tapLayer = el("div",{class:"tap-burst"});
    app.appendChild(renderBackground());
    app.appendChild(tapLayer);
    app.appendChild(stage);
    const modal = renderModal();
    if (modal) app.appendChild(modal);
    const cursor = renderCursor();
    if (cursor) app.appendChild(cursor);

    app.onpointermove = function(e){
      state.cursor = { x:e.clientX, y:e.clientY, visible:true };
      renderCursorOnly();
    };
    app.onpointerleave = function(){
      state.cursor.visible = false;
      renderCursorOnly();
    };
    app.onpointerdown = function(e){
      addBurst(e.clientX, e.clientY);
    };
  }

  function renderCursorOnly(){
    const old = app.querySelector(".claw-cursor");
    if (old) old.remove();
    const fresh = renderCursor();
    if (fresh) app.appendChild(fresh);
  }

  render();
})();
</script>
</body>
</html>
